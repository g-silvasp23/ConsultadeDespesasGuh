<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Consulta de Despesas</title>


    <link rel="icon" href="icon.png" type="image/png">


    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Mantém a estrutura fixa */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #2c3e50;
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0; /* Impede o header de encolher */
        }

        /* AJUSTE CHAVE: O container do iframe precisa permitir scroll interno no mobile */
        .content-container {
            flex-grow: 1;
            width: 100%;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; /* Suporte essencial para iOS */
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .footer {
            background: #fff;
            padding: 8px 15px;
            text-align: center;
            font-size: 0.75rem;
            color: #7f8c8d;
            border-top: 1px solid #eee;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Consulta de Despesas</h1>
        <div class="status">● Online</div>
    </div>

    <div class="content-container">
        <iframe 
            src="https://docs.google.com/spreadsheets/d/1OuCJaP_vChziQDIkcStqzxGS0nIdgmT-z1eY8jEoV-A/edit?rm=minimal" 
            scrolling="yes">
        </iframe>
    </div>

    <div class="footer">
        Use dois dedos para rolar se estiver travado
    </div>

</body>
</html>
